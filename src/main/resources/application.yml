server:
  port: 8080

github:
  token: ${GITHUB_TOKEN}
  username: ${GITHUB_USERNAME}
  content-repo: seung-content

jwt:
  secret: ${JWT_SECRET}
  expiration: 1800000

spring:
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - read:user
              - user:email
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=5m

cors:
  allowed-origins: http://localhost:5173,http://localhost:5174,https://TaeSeungJeon.github.io,https://taeseungjeon.github.io